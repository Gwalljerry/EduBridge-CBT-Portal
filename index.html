<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBridge | Digital Inclusion Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <header class="bg-blue-700 text-white p-6 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">EduBridge</h1>
            <span class="bg-blue-500 px-3 py-1 rounded-full text-xs font-semibold">NextGen Showcase 2026</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <section class="mb-10 text-center">
            <h2 class="text-3xl font-extrabold text-blue-900 mb-4">Bridging the Digital Divide in Education</h2>
            <p class="text-lg text-slate-600">A lightweight, low-data CBT platform designed for rural schools with limited internet access.</p>
        </section>

        <div id="app" class="bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
            <div id="welcome-screen">
                <h3 class="text-xl font-semibold mb-4 text-center">Welcome to the Assessment Portal</h3>
                <div class="space-y-4">
                    <input id="studentName" type="text" placeholder="Enter Full Name" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="startExam()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition duration-200">START MOCK EXAM</button>
                </div>
            </div>

            <div id="exam-screen" class="hidden">
                <div class="flex justify-between mb-6">
                    <span id="qCount" class="font-bold text-blue-600">Question 1 of 3</span>
                    <span id="timer" class="text-red-500 font-mono">05:00</span>
                </div>
                <h4 id="questionText" class="text-xl mb-6 font-medium leading-relaxed">Loading Question...</h4>
                <div id="options" class="space-y-3"></div>
            </div>

            <div id="result-screen" class="hidden text-center">
                <h3 class="text-2xl font-bold mb-4">Assessment Complete!</h3>
                <p class="text-4xl font-black text-blue-600 mb-6" id="finalScore">0/0</p>
                <p id="impactMessage" class="text-slate-500 italic mb-6"></p>
                <button onclick="location.reload()" class="bg-slate-800 text-white px-8 py-3 rounded-lg font-bold">RESTART PORTAL</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
